<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario de Cliente Nuevo - MC&DJ</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --yellow: #FFF97D;
            --dark: #16150E;
            --blue: #A0C7FE;
            --orange: #F65904;
            --gray: #F5F5F5;
            --gray-dark: #666;
            --gray-light: #E8E8E8;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #FAFAFA;
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        .app-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, var(--yellow) 0%, var(--blue) 100%);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .logo-container {
            width: 180px;
            height: 100px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container svg {
            width: 100%;
            height: auto;
            max-height: 100%;
        }

        .brand-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .brand-header p {
            font-size: 1.15rem;
            color: var(--dark);
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }

        .questionnaire-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .progress-bar-container {
            margin-bottom: 3rem;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .progress-label {
            font-weight: 600;
            color: var(--gray-dark);
            font-size: 0.9rem;
        }

        .progress-count {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            color: var(--orange);
            font-size: 0.9rem;
        }

        .progress-bar {
            height: 8px;
            background: var(--gray-light);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--orange), var(--yellow));
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(246, 89, 4, 0.3);
        }

        .question-container {
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            display: inline-block;
            background: var(--yellow);
            color: var(--dark);
            padding: 0.25rem 0.75rem;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .question-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        .question-subtitle {
            font-size: 1rem;
            color: var(--gray-dark);
            margin-bottom: 2rem;
        }

        .options-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-card {
            background: var(--gray);
            border: 3px solid transparent;
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option-card:hover {
            background: white;
            border-color: var(--blue);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(160, 199, 254, 0.3);
        }

        .option-card.selected {
            background: var(--yellow);
            border-color: var(--dark);
            box-shadow: 0 8px 24px rgba(255, 249, 125, 0.4);
        }

        .option-radio {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border: 3px solid var(--dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            transition: all 0.2s ease;
        }

        .option-card.selected .option-radio {
            background: var(--dark);
        }

        .option-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s ease;
        }

        .option-card.selected .option-radio::after {
            opacity: 1;
            transform: scale(1);
        }

        .option-content {
            flex: 1;
        }

        .option-label {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--dark);
            margin-bottom: 0.25rem;
        }

        .option-description {
            font-size: 0.9rem;
            color: var(--gray-dark);
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .input-field {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--gray-light);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: var(--gray);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--blue);
            background: white;
            box-shadow: 0 4px 12px rgba(160, 199, 254, 0.2);
        }

        .checkbox-group {
            display: grid;
            gap: 0.75rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: var(--gray);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .checkbox-item:hover {
            background: white;
            border-color: var(--blue);
        }

        .checkbox-item.checked {
            background: var(--yellow);
            border-color: var(--dark);
        }

        .checkbox-box {
            width: 24px;
            height: 24px;
            border: 2px solid var(--dark);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            flex-shrink: 0;
        }

        .checkbox-item.checked .checkbox-box {
            background: var(--dark);
        }

        .checkbox-box::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 700;
            opacity: 0;
        }

        .checkbox-item.checked .checkbox-box::after {
            opacity: 1;
        }

        .checkbox-label {
            font-weight: 500;
            color: var(--dark);
        }

        .navigation-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 1.25rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-back {
            flex: 0.4;
            background: white;
            color: var(--dark);
            border: 2px solid var(--gray-light);
        }

        .btn-back:hover:not(:disabled) {
            background: var(--gray);
            border-color: var(--dark);
        }

        .btn-next {
            background: var(--dark);
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            background: var(--orange);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(246, 89, 4, 0.4);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--orange), var(--yellow));
            color: var(--dark);
            font-weight: 900;
        }

        .btn-submit:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 12px 32px rgba(246, 89, 4, 0.5);
        }

        /* Thank you screen */
        .thank-you-container {
            animation: slideIn 0.4s ease;
            text-align: center;
        }

        .success-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, var(--yellow), var(--orange));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .thank-you-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 1rem;
        }

        .thank-you-subtitle {
            font-size: 1.2rem;
            color: var(--gray-dark);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .next-steps-box {
            background: var(--gray);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            text-align: left;
        }

        .next-steps-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--dark);
        }

        .step-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: start;
        }

        .step-item:last-child {
            margin-bottom: 0;
        }

        .step-icon {
            width: 40px;
            height: 40px;
            background: var(--yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--dark);
        }

        .step-desc {
            color: var(--gray-dark);
            font-size: 0.95rem;
        }

        .contact-info {
            background: var(--dark);
            color: white;
            padding: 2rem;
            border-radius: 16px;
        }

        .contact-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .contact-item:last-child {
            margin-bottom: 0;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-content {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 1.5rem;
            border: 4px solid var(--gray-light);
            border-top: 4px solid var(--orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-weight: 600;
            color: var(--dark);
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .questionnaire-card {
                padding: 2rem 1.5rem;
            }

            .brand-header h1 {
                font-size: 2rem;
            }

            .question-title {
                font-size: 1.5rem;
            }

            .thank-you-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Definición del cuestionario (igual que antes)
        const QUESTIONS = [
            {
                id: 'tipoPersona',
                type: 'multiple',
                title: '¿Qué tipo de persona eres o representa tu negocio?',
                subtitle: 'Puedes seleccionar ambas si aplican (por ejemplo: eres profesionista independiente Y tienes una empresa)',
                options: [
                    {
                        value: 'fisica',
                        label: 'Persona Física',
                        description: 'Soy un individuo que trabaja por cuenta propia o tengo ingresos personales'
                    },
                    {
                        value: 'moral',
                        label: 'Persona Moral',
                        description: 'Tengo una empresa constituida (S.A., S. de R.L., A.C., etc.)'
                    }
                ]
            },
            {
                id: 'actividadPrincipal',
                type: 'multiple',
                title: '¿Cuáles son tus actividades como Persona Física?',
                subtitle: 'Selecciona todas las que apliquen',
                condition: (answers) => answers.tipoPersona && answers.tipoPersona.includes('fisica'),
                options: [
                    {
                        value: 'profesionista',
                        label: 'Servicios Profesionales',
                        description: 'Médico, abogado, consultor, arquitecto, contador, etc.'
                    },
                    {
                        value: 'arrendamiento',
                        label: 'Arrendamiento',
                        description: 'Rento inmuebles (casas, locales, departamentos)'
                    },
                    {
                        value: 'empresarial',
                        label: 'Actividad Empresarial',
                        description: 'Comercio, ventas, servicios no profesionales'
                    },
                    {
                        value: 'asalariado',
                        label: 'Asalariado',
                        description: 'Trabajo en relación de dependencia y tengo otros ingresos'
                    },
                    {
                        value: 'jubilado',
                        label: 'Jubilado/Pensionado',
                        description: 'Recibo pensión o jubilación'
                    }
                ]
            },
            {
                id: 'facturacionMensual',
                type: 'single',
                title: '¿Cuál es tu nivel de facturación mensual aproximado como Persona Física?',
                subtitle: 'Esto nos ayuda a dimensionar el servicio',
                condition: (answers) => {
                    const actividades = answers.actividadPrincipal || [];
                    return actividades.includes('profesionista') || actividades.includes('empresarial');
                },
                options: [
                    { value: 'micro', label: 'Menos de $50,000', description: 'Operación pequeña o inicio de actividades' },
                    { value: 'pequeno', label: '$50,000 - $300,000', description: 'Negocio en crecimiento' },
                    { value: 'mediano', label: '$300,000 - $800,000', description: 'Operación consolidada' },
                    { value: 'grande', label: 'Más de $800,000', description: 'Gran volumen de operaciones' }
                ]
            },
            {
                id: 'facturacionMensualPM',
                type: 'single',
                title: '¿Cuál es el nivel de facturación mensual de tu empresa (Persona Moral)?',
                subtitle: 'Esto nos ayuda a dimensionar el servicio',
                condition: (answers) => answers.tipoPersona && answers.tipoPersona.includes('moral'),
                options: [
                    { value: 'micro', label: 'Menos de $100,000', description: 'Micro empresa' },
                    { value: 'pequeno', label: '$100,000 - $500,000', description: 'Pequeña empresa' },
                    { value: 'mediano', label: '$500,000 - $3,000,000', description: 'Mediana empresa' },
                    { value: 'grande', label: 'Más de $3,000,000', description: 'Gran empresa' }
                ]
            },
            {
                id: 'propiedadesArrendamiento',
                type: 'single',
                title: '¿Cuántas propiedades tienes en arrendamiento?',
                subtitle: 'Número aproximado de inmuebles rentados',
                condition: (answers) => {
                    const actividades = answers.actividadPrincipal || [];
                    return actividades.includes('arrendamiento');
                },
                options: [
                    { value: '1-2', label: '1-2 propiedades', description: 'Arrendamiento básico' },
                    { value: '3-5', label: '3-5 propiedades', description: 'Múltiples propiedades' },
                    { value: '6-15', label: '6-15 propiedades', description: 'Cartera mediana' },
                    { value: '15+', label: 'Más de 15 propiedades', description: 'Gran cartera' }
                ]
            },
            {
                id: 'tieneEmpleados',
                type: 'single',
                title: '¿Tienes empleados?',
                subtitle: 'Personas en nómina con relación laboral',
                options: [
                    { value: 'no', label: 'No tengo empleados', description: 'Trabajo solo o con socios' },
                    { value: '1-5', label: '1 a 5 empleados', description: 'Equipo pequeño' },
                    { value: '6-15', label: '6 a 15 empleados', description: 'Equipo mediano' },
                    { value: '16-50', label: '16 a 50 empleados', description: 'Empresa mediana' },
                    { value: '50+', label: 'Más de 50 empleados', description: 'Empresa grande' }
                ]
            },
            {
                id: 'actividadesComplementarias',
                type: 'multiple',
                title: '¿Realizas alguna de estas actividades? (Puedes seleccionar varias)',
                subtitle: 'Servicios adicionales o especiales',
                options: [
                    { value: 'comercio', label: 'Comercio al por menor', description: 'Venta de productos con inventarios' },
                    { value: 'manufactura', label: 'Manufactura o producción', description: 'Fabricación de productos' },
                    { value: 'construccion', label: 'Construcción', description: 'Obras, proyectos de construcción' },
                    { value: 'restaurante', label: 'Restaurante / Alimentos', description: 'Servicio de alimentos y bebidas' },
                    { value: 'importacion', label: 'Importación / Exportación', description: 'Comercio exterior' },
                    { value: 'ninguna', label: 'Ninguna de las anteriores', description: '' }
                ]
            },
            {
                id: 'etapaDelNegocio',
                type: 'single',
                title: '¿En qué etapa se encuentra tu negocio?',
                subtitle: 'Esto nos ayuda a ofrecerte el soporte adecuado',
                options: [
                    { value: 'preoperacion', label: 'Pre-operación', description: 'Aún no inicio o estoy por iniciar' },
                    { value: 'inicio', label: 'Inicio (menos de 1 año)', description: 'Primeros meses de operación' },
                    { value: 'crecimiento', label: 'En crecimiento', description: 'Expandiendo operaciones o equipo' },
                    { value: 'consolidado', label: 'Consolidado', description: 'Operación estable y madura' }
                ]
            },
            {
                id: 'volumenOperaciones',
                type: 'single',
                title: '¿Aproximadamente cuántas operaciones realizas al mes?',
                subtitle: 'Considera: facturas emitidas + facturas recibidas + movimientos bancarios. Esto nos ayuda a dimensionar correctamente el trabajo.',
                options: [
                    { value: 'muy_bajo', label: 'Muy Bajo (Menos de 100)', description: 'Pocas operaciones al mes' },
                    { value: 'bajo', label: 'Bajo (100 - 500)', description: 'Operaciones básicas' },
                    { value: 'medio', label: 'Medio (501 - 1,500)', description: 'Volumen moderado' },
                    { value: 'alto', label: 'Alto (1,501 - 5,000)', description: 'Volumen considerable' },
                    { value: 'muy_alto', label: 'Muy Alto (Más de 5,000)', description: 'Volumen muy grande' }
                ]
            },
            {
                id: 'cuentasBancarias',
                type: 'single',
                title: '¿Con cuántas cuentas bancarias opera tu negocio?',
                subtitle: 'Incluye cuentas de cheques, ahorro, inversión y tarjetas empresariales. Cada cuenta requiere conciliación mensual.',
                options: [
                    { value: '1', label: '1 cuenta', description: 'Una sola cuenta bancaria' },
                    { value: '2-3', label: '2-3 cuentas', description: 'Pocas cuentas' },
                    { value: '4-6', label: '4-6 cuentas', description: 'Múltiples cuentas' },
                    { value: '7-10', label: '7-10 cuentas', description: 'Muchas cuentas' },
                    { value: '10+', label: 'Más de 10 cuentas', description: 'Alto número de cuentas' }
                ]
            },
            {
                id: 'operacionesSinCFDI',
                type: 'single',
                title: '¿Qué porcentaje de tus movimientos bancarios NO tienen factura (CFDI)?',
                subtitle: 'Ejemplo: efectivo, transferencias sin factura, comisiones bancarias, intereses. Estas operaciones requieren clasificación manual adicional.',
                options: [
                    { value: '0-10', label: 'Casi ninguna (0-10%)', description: 'Todo o casi todo está facturado' },
                    { value: '11-25', label: 'Pocas (11-25%)', description: 'La mayoría tiene factura' },
                    { value: '26-50', label: 'Algunas (26-50%)', description: 'Aproximadamente la mitad' },
                    { value: '51-75', label: 'Bastantes (51-75%)', description: 'Muchas sin factura' },
                    { value: '76-100', label: 'La mayoría (76-100%)', description: 'Principalmente operaciones sin factura' }
                ]
            },
            {
                id: 'datosContacto',
                type: 'form',
                title: 'Por último, tus datos de contacto',
                subtitle: 'Para poder enviarte información y ponernos en contacto',
                fields: [
                    { name: 'nombre', label: 'Nombre completo o razón social', type: 'text', required: true },
                    { name: 'email', label: 'Correo electrónico', type: 'email', required: true },
                    { name: 'telefono', label: 'Teléfono', type: 'tel', required: true },
                    { name: 'comentarios', label: 'Comentarios adicionales (opcional)', type: 'textarea', required: false }
                ]
            }
        ];

        // Función para calcular complejidad operativa
        function calcularComplejidad(answers) {
            // Puntos por facturación
            const facturacion = answers.facturacionMensualPM || answers.facturacionMensual || 'micro';
            const puntosFacturacion = {
                'micro': 1,
                'pequeno': 2,
                'mediano': 3,
                'grande': 4
            }[facturacion] || 2;

            // Puntos por volumetría (PESO MAYOR)
            const volumetria = answers.volumenOperaciones || 'bajo';
            const puntosVolumetria = {
                'muy_bajo': 1,
                'bajo': 2,
                'medio': 3,
                'alto': 4,
                'muy_alto': 5
            }[volumetria] || 2;

            // Puntos por empleados
            const empleados = answers.tieneEmpleados || 'no';
            const puntosEmpleados = {
                'no': 1,
                '1-5': 2,
                '6-15': 2,
                '16-50': 3,
                '50+': 4
            }[empleados] || 1;

            // Cálculo ponderado: 30% facturación, 50% volumetría, 20% empleados
            const complejidadTotal = 
                (puntosFacturacion * 0.3) +
                (puntosVolumetria * 0.5) +
                (puntosEmpleados * 0.2);

            // Clasificación final
            let nivelComplejidad;
            if (complejidadTotal < 1.5) nivelComplejidad = 'MICRO';
            else if (complejidadTotal < 2.5) nivelComplejidad = 'PEQUEÑO';
            else if (complejidadTotal < 3.5) nivelComplejidad = 'MEDIANO';
            else if (complejidadTotal < 4.5) nivelComplejidad = 'GRANDE';
            else nivelComplejidad = 'CORPORATIVO';

            // Factor de cuentas bancarias
            const cuentas = answers.cuentasBancarias || '1';
            const numeroCuentas = cuentas === '10+' ? 12 : (cuentas === '7-10' ? 8 : (cuentas === '4-6' ? 5 : (cuentas === '2-3' ? 2.5 : 1)));
            
            // Factor de operaciones sin CFDI
            const opsSinCFDI = answers.operacionesSinCFDI || '0-10';
            const porcentajeSinCFDI = {
                '0-10': 5,
                '11-25': 18,
                '26-50': 38,
                '51-75': 63,
                '76-100': 88
            }[opsSinCFDI] || 5;

            const factorSinCFDI = 1 + (porcentajeSinCFDI / 100);

            // Estimación de horas mensuales
            const horasBase = {
                'MICRO': 10,
                'PEQUEÑO': 25,
                'MEDIANO': 45,
                'GRANDE': 80,
                'CORPORATIVO': 140
            }[nivelComplejidad];

            const horasEstimadas = Math.round(horasBase * (numeroCuentas / 2.5) * factorSinCFDI);

            return {
                nivelPorFacturacion: facturacion.toUpperCase(),
                nivelPorVolumetria: volumetria.toUpperCase().replace('_', ' '),
                nivelReal: nivelComplejidad,
                cuentasBancarias: cuentas,
                operacionesSinCFDI: opsSinCFDI,
                porcentajeSinCFDI: porcentajeSinCFDI,
                horasEstimadas: horasEstimadas,
                factorComplejidad: complejidadTotal.toFixed(2)
            };
        }

        // Lógica de determinación de perfiles (actualizada para multi-selección)
        function determineProfiles(answers) {
            const profiles = [];
            const tiposPersona = answers.tipoPersona || [];
            const actividadesPF = answers.actividadPrincipal || [];

            // Personas Físicas
            if (tiposPersona.includes('fisica')) {
                if (actividadesPF.includes('profesionista')) {
                    profiles.push({ 
                        id: 'PF-01-PROF', 
                        name: 'Profesionista Independiente', 
                        code: 'PF-01-PROF', 
                        range: answers.facturacionMensual, 
                        services: { obligatorios: 10, opcionales: 4 } 
                    });
                }
                if (actividadesPF.includes('arrendamiento')) {
                    profiles.push({ 
                        id: 'PF-02-ARREN', 
                        name: 'Arrendador', 
                        code: 'PF-02-ARREN', 
                        range: answers.propiedadesArrendamiento, 
                        services: { obligatorios: 7, opcionales: 3 } 
                    });
                }
                if (actividadesPF.includes('empresarial')) {
                    profiles.push({ 
                        id: 'PF-04-RESICO', 
                        name: 'Actividad Empresarial RESICO', 
                        code: 'PF-04-RESICO', 
                        range: answers.facturacionMensual, 
                        services: { obligatorios: 10, opcionales: 3 } 
                    });
                }
                if (actividadesPF.includes('asalariado')) {
                    profiles.push({ 
                        id: 'PF-03-ASAL', 
                        name: 'Asalariado con Ingresos Adicionales', 
                        code: 'PF-03-ASAL', 
                        services: { obligatorios: 2, opcionales: 4 } 
                    });
                }
                if (actividadesPF.includes('jubilado')) {
                    profiles.push({ 
                        id: 'PF-05-JUB', 
                        name: 'Jubilado/Pensionado', 
                        code: 'PF-05-JUB', 
                        services: { obligatorios: 1, opcionales: 2 } 
                    });
                }
            }

            // Personas Morales
            if (tiposPersona.includes('moral')) {
                if (answers.tieneEmpleados === 'no') {
                    profiles.push({ id: 'PM-01-SINEMP', name: 'Persona Moral Sin Empleados', code: 'PM-01-SINEMP', range: answers.facturacionMensualPM, services: { obligatorios: 17, opcionales: 4 } });
                } else if (['1-5', '6-15'].includes(answers.tieneEmpleados)) {
                    profiles.push({ id: 'PM-02-EMP-PEQ', name: 'Persona Moral con Empleados - Pequeña', code: 'PM-02-EMP-PEQ', range: answers.tieneEmpleados, services: { obligatorios: 28, opcionales: 3 } });
                } else if (['16-50'].includes(answers.tieneEmpleados)) {
                    profiles.push({ id: 'PM-03-EMP-MED', name: 'Persona Moral con Empleados - Mediana', code: 'PM-03-EMP-MED', range: answers.tieneEmpleados, services: { obligatorios: 32, opcionales: 6 } });
                } else if (answers.tieneEmpleados === '50+') {
                    profiles.push({ id: 'PM-04-EMP-GDE', name: 'Persona Moral Grande', code: 'PM-04-EMP-GDE', range: answers.tieneEmpleados, services: { obligatorios: 38, opcionales: 4 } });
                }
            }

            if (answers.actividadesComplementarias) {
                if (answers.actividadesComplementarias.includes('comercio')) {
                    profiles.push({ id: 'ACT-01-COMER', name: 'Comercio al Por Menor', code: 'ACT-01-COMER', services: { obligatorios: 2, opcionales: 1 } });
                }
                if (answers.actividadesComplementarias.includes('manufactura')) {
                    profiles.push({ id: 'ACT-03-MANUF', name: 'Manufactura', code: 'ACT-03-MANUF', services: { obligatorios: 3, opcionales: 2 } });
                }
                if (answers.actividadesComplementarias.includes('construccion')) {
                    profiles.push({ id: 'ACT-04-CONST', name: 'Construcción', code: 'ACT-04-CONST', services: { obligatorios: 3, opcionales: 0 } });
                }
                if (answers.actividadesComplementarias.includes('restaurante')) {
                    profiles.push({ id: 'ACT-05-REST', name: 'Restaurante/Alimentos', code: 'ACT-05-REST', services: { obligatorios: 2, opcionales: 1 } });
                }
                if (answers.actividadesComplementarias.includes('importacion')) {
                    profiles.push({ id: 'ACT-06-COMEXT', name: 'Comercio Exterior', code: 'ACT-06-COMEXT', services: { obligatorios: 4, opcionales: 0 } });
                }
            }

            if (['preoperacion', 'inicio'].includes(answers.etapaDelNegocio)) {
                profiles.push({ id: 'ETA-01-START', name: 'Startup / Inicio de Operaciones', code: 'ETA-01-START', services: { obligatorios: 5, opcionales: 2 } });
            }

            if (answers.etapaDelNegocio === 'crecimiento') {
                profiles.push({ id: 'ETA-02-CREC', name: 'En Crecimiento', code: 'ETA-02-CREC', services: { obligatorios: 2, opcionales: 2 } });
            }

            return profiles;
        }

        // Función para enviar datos a la API de Vercel
        async function sendData(answers, profiles, complejidad, serviciosTotales) {
            const fecha = new Date().toLocaleDateString('es-MX');
            
            const data = {
                respuestas: answers,
                perfiles: profiles,
                complejidad: complejidad,
                fecha: fecha,
                serviciosTotales: serviciosTotales
            };

            try {
                // Llamar a la API de Vercel
                const response = await fetch('/api/send-questionnaire', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error('Error al enviar los datos');
                }

                const result = await response.json();
                console.log('Datos enviados exitosamente:', result);
                return true;

            } catch (error) {
                console.error('Error enviando datos:', error);
                // Aún así mostrar pantalla de gracias
                return true;
            }
        }

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [answers, setAnswers] = useState({});
            const [showThankYou, setShowThankYou] = useState(false);
            const [isLoading, setIsLoading] = useState(false);

            const visibleQuestions = QUESTIONS.filter(q => {
                if (!q.condition) return true;
                return q.condition(answers);
            });

            const currentQuestion = visibleQuestions[currentStep];
            const progress = ((currentStep + 1) / visibleQuestions.length) * 100;

            const handleAnswer = (questionId, value) => {
                setAnswers(prev => ({ ...prev, [questionId]: value }));
            };

            const canProceed = () => {
                if (!currentQuestion) return false;
                const answer = answers[currentQuestion.id];
                
                if (currentQuestion.type === 'form') {
                    const requiredFields = currentQuestion.fields.filter(f => f.required);
                    return requiredFields.every(field => answer && answer[field.name] && answer[field.name].trim());
                }

                if (currentQuestion.type === 'multiple') {
                    return answer && Array.isArray(answer) && answer.length > 0;
                }

                return answer !== undefined && answer !== null;
            };

            const handleNext = async () => {
                if (currentStep < visibleQuestions.length - 1) {
                    setCurrentStep(prev => prev + 1);
                } else {
                    // Finalizar cuestionario
                    setIsLoading(true);
                    const profiles = determineProfiles(answers);
                    const complejidad = calcularComplejidad(answers);
                    
                    // Calcular totales
                    const serviciosTotales = profiles.reduce((sum, p) => 
                        sum + (p.services?.obligatorios || 0) + (p.services?.opcionales || 0), 0
                    );
                    
                    try {
                        await sendData(answers, profiles, complejidad, serviciosTotales);
                        setIsLoading(false);
                        setShowThankYou(true);
                    } catch (error) {
                        console.error('Error:', error);
                        setIsLoading(false);
                        setShowThankYou(true); // Mostrar pantalla de gracias de todos modos
                    }
                }
            };

            const handleBack = () => {
                if (currentStep > 0) {
                    setCurrentStep(prev => prev - 1);
                }
            };

                return <ThankYouScreen clientData={answers.datosContacto} />;
